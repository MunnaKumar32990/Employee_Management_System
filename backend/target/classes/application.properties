# Server Configuration
server.port=${SERVER_PORT:8081}
spring.application.name=employee-management-system
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:employee_management_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:munna@6556}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.access.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Logging Configuration
logging.level.root=INFO
logging.level.com.ems=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tax Configuration (Percentage)
payroll.tax.percentage=${PAYROLL_TAX_PERCENTAGE:10}
payroll.overtime.rate=${PAYROLL_OVERTIME_RATE:1.5}

# Security Configuration
security.max-login-attempts=${MAX_LOGIN_ATTEMPTS:5}
security.account-lock-duration=${ACCOUNT_LOCK_DURATION:900000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
